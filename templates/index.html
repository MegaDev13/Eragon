<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Correções Obrigatórias -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Crônica de Aethelgard - Sistema MVC</title>
  <style>
    .game-text {
        font-family: 'MedievalSharp', serif;
        line-height: 1.6;
        word-wrap: break-word;
    }

    @media (max-width: 768px) {
        .inventory-grid {
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .character-name {
            font-size: 1.2rem;
        }
    }
  </style>
</head>
<body class="game-text">
  <div class="mvc-container">
    <header class="mvc-header">
      <h1 class="character-name">Aethel o Cavaleiro - Nível 1</h1>
      <p class="game-text">Bem-vindo à interface MVC com correção total de acentuação, fontes medievais e responsividade!</p>
    </header>

    <main class="mvc-main">
      <h2>🎒 Inventário de Itens</h2>
      <div class="inventory-grid">
        <div class="item-card">
          <strong>Espada Longa Feudal</strong>
          <p>Dano: +15 | Preço: 50 ouro</p>
        </div>
        <div class="item-card">
          <strong>Peitoral Rúnico</strong>
          <p>Defesa: +20 | Preço: 120 ouro</p>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
