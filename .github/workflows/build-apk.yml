name: Build APK + Deploy GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 1. Node.js LTS (20)
      - name: ⚙️ Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 2. Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # 3. Prepare www/ folder automatically (for Capacitor)
      - name: 🛠️ Prepare web assets (www/)
        run: npm run prepare:web

      # 4. Setup Java 17
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 5. Add Android platform if missing + sync
      - name: 📱 Prepare Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 6. Build APK (Debug)
      - name: 🔨 Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 7. Upload APK as Artifact
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crônica-de-Aethelgard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

  # Separate job for GitHub Pages (deploys the original web files)
  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node (for Pages)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Deploy the ROOT project (index.html + all game files) to GitHub Pages
      - name: 🌐 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          clean-exclude:
            - ".nojekyll"